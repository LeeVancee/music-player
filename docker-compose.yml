include:
  - docker-compose.dev.yml

services:
  app:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/node:22-bookworm-slim}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRES_URL: postgresql://postgres:postgres@pgsql:5432/music
    ports:
      - "3000:3000"
    volumes:
      - ./tracks:/app/tracks
      - ./covers:/app/covers
    depends_on:
      pgsql:
        condition: service_healthy
    restart: unless-stopped
